apiVersion: apps/v1
kind: Deployment
metadata:
  name: 2nd-deploy
  labels:
    app: 2nd-deploy-lbl
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mota1-pod
  template:
    metadata:
      labels:
        app: mota1-pod
    spec:
      containers:
      - name: motas-container
        image: prashant6395/bankapp-image
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: 2nd-deploy-np-service
spec:
  type: NodePort
  selector:
    app: mota1-pod
  ports:
    - protocol: TCP
      port: 8080        # internal cluster port
      targetPort: 8080 # must match containerPort above
      nodePort: 30008       # external port (30000–32767)
