apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-deployment       # e.g., myapp-deployment
  labels:
    app: new-deployment-lbl            # e.g., myapp
spec:
  replicas: 5     # e.g., 3
  selector:
    matchLabels:
      app: motapa-lbl          # must match Pod labels below
  template:
    metadata:
      labels:
        app: motapa-lbl        # Pod label
    spec:
      containers:
        - name: new-container     # e.g., myapp-container
          image: prashant6395/new-image:v2.0   # e.g., user/repo:latest
          ports:
            - containerPort: 8080   # e.g., 8080
---
apiVersion: v1
kind: Service
metadata:
  name: motapa-np-svc          # e.g., myapp-np-service
spec:
  type: NodePort
  selector:
    app: motapa-lbl            # must match Pod labels above
  ports:
    - port: 8080           # e.g., 8080 (inside cluster)
      targetPort: 8080   # must match containerPort above
