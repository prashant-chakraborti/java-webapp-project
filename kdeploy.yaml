apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-deployment 
spec:
  replicas: 15
  selector:
    matchLabels:
      app: cicd-lbl
  template:
    metadata:
      labels:
        app: cicd-lbl
    spec:
      containers:
      - name: cicd-container
        image: prashant6395/cicd_image:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cicd-np-service 
spec:
  type: NodePort
  selector:
    app: cicd-lbl
  ports:
  - port: 8080
    targetPort: 8080
